<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login - Dadar Shop</title>
<link rel="stylesheet" href="css/style.css"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>"/>
</head>
<body>
<div class="toast-container"></div>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="logo" style="justify-content:center;">
        <div class="logo-icon">D</div>
        <div class="logo-text"><span class="logo-name">Dadar Shop</span><span class="logo-tagline">Your Trusted Online Marketplace</span></div>
      </a>
      <h2 style="margin-top:20px;">Welcome Back 👋</h2>
      <p>Sign in to your Dadar Shop account</p>
    </div>

    <div class="auth-social-btns">
      <button class="social-auth-btn" onclick="showToast('Google Login','Connecting to Google...','info')">🔴 Google</button>
      <button class="social-auth-btn" onclick="showToast('Facebook Login','Connecting to Facebook...','info')">🔵 Facebook</button>
    </div>

    <div class="auth-divider">or login with email</div>

    <form class="login-form">
      <div class="form-group">
        <label class="form-label">Email or Phone</label>
        <div class="input-group-icon">
          <i>📧</i>
          <input type="text" class="form-control" placeholder="Enter email or phone" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" style="display:flex;justify-content:space-between;">Password <a href="#" style="color:var(--primary);font-size:12px;font-weight:500;">Forgot Password?</a></label>
        <div class="password-toggle">
          <input type="password" class="form-control" placeholder="Enter your password" required/>
          <span class="toggle-pass">👁️</span>
        </div>
      </div>
      <div class="form-check" style="margin-bottom:20px;">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me for 30 days</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Login to Dadar Shop</button>
    </form>

    <div style="background:var(--bg);border-radius:var(--radius-md);padding:14px;margin-top:16px;text-align:center;">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Demo credentials</div>
      <div style="font-size:13px;font-weight:600;">user@dadarshop.com / password123</div>
    </div>

    <div class="auth-footer">Don't have an account? <a href="register.html">Create Account</a></div>
    <div class="auth-footer" style="margin-top:6px;"><a href="index.html" style="color:var(--text-muted);font-size:12px;">← Back to Dadar Shop</a></div>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
