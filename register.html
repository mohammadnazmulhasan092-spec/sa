<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Create Account - Dadar Shop</title>
<link rel="stylesheet" href="css/style.css"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>"/>
</head>
<body>
<div class="toast-container"></div>
<div class="auth-page">
  <div class="auth-card" style="max-width:500px;">
    <div class="auth-logo">
      <a href="index.html" class="logo" style="justify-content:center;">
        <div class="logo-icon">D</div>
        <div class="logo-text"><span class="logo-name">Dadar Shop</span><span class="logo-tagline">Your Trusted Online Marketplace</span></div>
      </a>
      <h2 style="margin-top:20px;">Create Your Account 🎉</h2>
      <p>Join millions of shoppers on Dadar Shop</p>
    </div>

    <div class="auth-social-btns">
      <button class="social-auth-btn" onclick="showToast('Google Signup','Connecting to Google...','info')">🔴 Continue with Google</button>
      <button class="social-auth-btn" onclick="showToast('Facebook Signup','Connecting to Facebook...','info')">🔵 Continue with Facebook</button>
    </div>

    <div class="auth-divider">or create with email</div>

    <form class="register-form">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-control" placeholder="First name" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-control" placeholder="Last name" required/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="input-group-icon"><i>📧</i><input type="email" class="form-control" placeholder="your@email.com" required/></div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <div class="input-group-icon"><i>📞</i><input type="tel" class="form-control" placeholder="+880 17XXXXXXXX" required/></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="password-toggle">
          <input type="password" class="form-control" placeholder="Create a strong password" required/>
          <span class="toggle-pass">👁️</span>
        </div>
        <div class="form-hint">Minimum 8 characters with letters and numbers</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="password-toggle">
          <input type="password" class="form-control" placeholder="Confirm your password" required/>
          <span class="toggle-pass">👁️</span>
        </div>
      </div>
      <div class="form-check" style="margin-bottom:20px;">
        <input type="checkbox" id="terms" required>
        <label for="terms">I agree to <a href="#" style="color:var(--primary)">Terms of Service</a> and <a href="#" style="color:var(--primary)">Privacy Policy</a></label>
      </div>
      <div class="form-check" style="margin-bottom:20px;">
        <input type="checkbox" id="newsletter" checked>
        <label for="newsletter">Send me exclusive deals and offers via email</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">🎉 Create My Account</button>
    </form>

    <div auth-footer" style="text-align:center;margin-top:16px;font-size:13px;">Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600;">Login Here</a></div>
    <div style="text-align:center;margin-top:8px;"><a href="index.html" style="color:var(--text-muted);font-size:12px;">← Back to Dadar Shop</a></div>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
